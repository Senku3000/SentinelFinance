{% extends "base.html" %}
{% block title %}Login - SentinelFinance{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-60px)]">
    <div class="bg-gray-800 rounded-lg shadow-xl p-8 w-full max-w-md">
        <h2 class="text-2xl font-bold text-center mb-6 text-emerald-400">Welcome Back</h2>

        {% if error %}
        <div class="bg-red-900/50 border border-red-700 text-red-300 px-4 py-2 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded text-white focus:outline-none focus:border-emerald-500">
            </div>
            <button type="submit"
                class="w-full py-2 bg-emerald-600 hover:bg-emerald-700 rounded font-semibold transition">
                Log In
            </button>
        </form>

        <p class="text-center text-gray-500 mt-4 text-sm">
            Don't have an account? <a href="/signup" class="text-emerald-400 hover:underline">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
